apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: aerostack
type: Opaque
stringData:
  password: CHANGE_ME_STRONG_PASSWORD
  url: redis://:CHANGE_ME_STRONG_PASSWORD@redis-master:6379
---
