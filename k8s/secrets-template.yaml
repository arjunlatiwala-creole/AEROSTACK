# Aerostack Kubernetes Secrets Template
# IMPORTANT: This is a template file. DO NOT commit actual secrets to git.
# Copy this to secrets.yaml and fill in actual values, then apply with:
# kubectl apply -f k8s/secrets.yaml -n aerostack

apiVersion: v1
kind: Namespace
metadata:
  name: aerostack
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  namespace: aerostack
type: Opaque
stringData:
  username: agent
  password: CHANGE_ME_STRONG_PASSWORD
  url: mongodb://agent:CHANGE_ME_STRONG_PASSWORD@mongodb:27017/aerostack
  database: aerostack
---
# Optional: PostgreSQL (if needed for specific use cases)
# apiVersion: v1
# kind: Secret
# metadata:
