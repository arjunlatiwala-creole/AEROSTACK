version: "3.8"

services:
  # MongoDB - Primary data store for stateless agent architecture
  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes:
      - "./mongodata:/data/db"
      - "./database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro"
    environment:
      MONGO_INITDB_ROOT_USERNAME: agent
      MONGO_INITDB_ROOT_PASSWORD: agentpass
      MONGO_INITDB_DATABASE: aerostack
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis - Caching and session storage
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --requirepass agentpass
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: PostgreSQL for specific relational needs (can be disabled)
  postgres:
    image: postgres:16
    ports: ["5432:5432"]
    volumes: ["./pgdata:/var/lib/postgresql/data"]
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agentpass
      POSTGRES_DB: agentdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agentdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles: ["full"] # Only start with: docker-compose --profile full up

volumes:
  pgdata:
  mongodata:
