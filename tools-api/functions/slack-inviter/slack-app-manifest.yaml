display_information:
  name: Aerostack-SLACK-AGENT
  description: "enterprise Aerostack platform — workspace administration, channel management, user invites, and offboarding"
  background_color: "#7C3AED"
  long_description: |
    Aerostack Slack Admin provides programmatic workspace administration for the enterprise consulting platform.
    
    Capabilities:
    - Channel management: create, archive, rename, set topic/purpose
    - User invites: add users to channels, Slack Connect
    - User management: list, lookup by email
    - Bulk operations: invite multiple users to channels

features:
  bot_user:
    display_name: Aerostack-SLACK-AGENT
    always_online: true

oauth_config:
  scopes:
    bot:
      - channels:read
      - channels:manage
      - channels:join
      - groups:read
      - groups:write
      - users:read
      - users:read.email
      - chat:write
      - reactions:write
      - conversations.connect:manage
      - conversations.connect:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
